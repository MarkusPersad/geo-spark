<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* 场景容器 */
        .scene {
            position: relative;
            width: 100%;
            height: 300px;
        }

        /* 地面 */
        .ground {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg,
            transparent 0%,
            rgba(0, 255, 255, 0.4) 20%,
            rgba(0, 255, 255, 0.8) 50%,
            rgba(0, 255, 255, 0.4) 80%,
            transparent 100%
            );
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        /* 地面网格 */
        .grid {
            position: absolute;
            bottom: 50px;
            left: 0;
            right: 0;
            height: 100px;
            background-image:
                    repeating-linear-gradient(90deg,
                    transparent 0px,
                    transparent 78px,
                    rgba(0, 255, 255, 0.15) 78px,
                    rgba(0, 255, 255, 0.15) 80px
                    ),
                    repeating-linear-gradient(0deg,
                    transparent 0px,
                    transparent 38px,
                    rgba(0, 255, 255, 0.1) 38px,
                    rgba(0, 255, 255, 0.1) 40px
                    );
            animation: gridMove 3s linear infinite;
            transform: perspective(200px) rotateX(60deg);
            transform-origin: center bottom;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: -80px 0; }
        }

        /* 轮子容器 - 水平移动 */
        .wheel-container {
            position: absolute;
            bottom: 83px;
            left: -120px;
            width: 100px;
            height: 100px;
            animation: rollAcross 12s linear infinite;
            will-change: transform;
        }

        /* 轮子 - 纯旋转 */
        .wheel {
            width: 100%;
            height: 100%;
            animation: spin 3s linear infinite;
            will-change: transform;
        }

        .wheel svg {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 10px 30px rgba(0, 255, 255, 0.5));
        }

        /* 水平滚动 */
        @keyframes rollAcross {
            0% { left: -120px; }
            100% { left: calc(100% + 120px); }
        }

        /* 旋转动画 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 阴影 */
        .shadow {
            position: absolute;
            bottom: 75px;
            left: -120px;
            width: 80px;
            height: 15px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.4) 0%, transparent 70%);
            border-radius: 50%;
            animation: shadowMove 12s linear infinite;
            filter: blur(5px);
        }

        @keyframes shadowMove {
            0% { left: -110px; transform: scale(1); opacity: 0.6; }
            50% { transform: scale(0.8); opacity: 0.3; }
            100% { left: calc(100% + 110px); transform: scale(1); opacity: 0.6; }
        }

        /* 速度线 */
        .wind-lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .wind-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0,255,255,0.4), transparent);
            border-radius: 2px;
            animation: wind 4s linear infinite;
        }

        .wind-line:nth-child(1) { width: 200px; top: 40%; animation-delay: 0s; }
        .wind-line:nth-child(2) { width: 150px; top: 60%; animation-delay: 1.3s; }
        .wind-line:nth-child(3) { width: 100px; top: 30%; animation-delay: 2.6s; }

        @keyframes wind {
            0% { left: -250px; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 100%; opacity: 0; }
        }

        /* 加载文字 */
        .loading-text {
            margin-top: 40px;
            color: #00ffff;
            font-size: 16px;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 300;
            animation: breathe 3s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; letter-spacing: 8px; }
            50% { opacity: 1; letter-spacing: 12px; }
        }

        /* 装饰粒子 */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #00ffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ffff;
            animation: drift 6s ease-in-out infinite;
        }

        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 90%; top: 30%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 20%; top: 70%; animation-delay: 4s; }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); opacity: 0.2; }
            50% { transform: translate(10px, -20px); opacity: 0.6; }
        }
    </style>
</head>
